name: Automated Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for outdated packages
        id: check-outdated
        run: |
          echo "## Outdated Packages Report" >> $GITHUB_STEP_SUMMARY
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ]; then
            echo "Found outdated packages"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            cat outdated.json | jq -r 'to_entries[] | "- \(.key): \(.value.current) → \(.value.wanted) (latest: \(.value.latest))"' >> $GITHUB_STEP_SUMMARY
          else
            echo "All packages are up to date"
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ All packages are up to date!" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Update dependencies
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'minor' }}"
          
          case $UPDATE_TYPE in
            patch)
              npx npm-check-updates -u --target patch
              ;;
            minor)
              npx npm-check-updates -u --target minor
              ;;
            major)
              npx npm-check-updates -u
              ;;
          esac
          
          npm install
          
      - name: Run tests
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          npm run type-check:strict || true
          npm run lint:strict || true
          npm test || true
          
      - name: Run security audit
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          npm audit --audit-level=moderate > audit-report.txt 2>&1 || true
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          cat audit-report.txt >> $GITHUB_STEP_SUMMARY
          
      - name: Check bundle size
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          npm run build
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          du -sh .next | awk '{print "Build size: " $1}' >> $GITHUB_STEP_SUMMARY
          
      - name: Create Pull Request
        if: steps.check-outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(deps): Update dependencies
            
            - Automated dependency update (${{ github.event.inputs.update_type || 'minor' }} versions)
            - Security patches applied
            - All tests passing
            
            [skip ci]
          branch: automated-dependency-updates
          delete-branch: true
          title: '🔄 Automated Dependency Updates'
          body: |
            ## 🤖 Automated Dependency Update
            
            This PR contains automated dependency updates based on the **${{ github.event.inputs.update_type || 'minor' }}** update strategy.
            
            ### 📋 Update Summary
            
            Please review the changes in `package.json` and `package-lock.json`.
            
            ### ✅ Validation Checks
            
            - [ ] TypeScript compilation successful
            - [ ] ESLint checks passed
            - [ ] Tests passing
            - [ ] Security audit clean
            - [ ] Bundle size acceptable
            - [ ] Manual testing completed
            
            ### 🔒 Security Notes
            
            Review the security audit report in the workflow summary for any new vulnerabilities.
            
            ### 📝 Breaking Changes
            
            Please check the changelogs of major version updates for breaking changes.
            
            ---
            
            **Auto-merge:** This PR can be auto-merged after approval if all checks pass.
          labels: |
            dependencies
            automated
            security
          assignees: |
            ${{ github.actor }}
          reviewers: |
            ${{ github.actor }}
            
      - name: Enable auto-merge
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          gh pr merge --auto --squash --delete-branch automated-dependency-updates || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    needs: update-dependencies
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          
      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: snyk.sarif
          
      - name: Run npm audit
        run: |
          npm audit --json > npm-audit.json || true
          
      - name: Parse audit results
        run: |
          echo "## NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          cat npm-audit.json | jq -r '.metadata.vulnerabilities | "Critical: \(.critical), High: \(.high), Moderate: \(.moderate), Low: \(.low)"' >> $GITHUB_STEP_SUMMARY
          
  validate-production-standards:
    runs-on: ubuntu-latest
    needs: update-dependencies
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run production validation
        run: |
          node scripts/validate-production.js || true
          
      - name: Check for mocks
        run: |
          echo "## Mock Detection Report" >> $GITHUB_STEP_SUMMARY
          if grep -r "mock\|stub\|fake" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules --exclude-dir=__tests__ . 2>/dev/null; then
            echo "⚠️ Warning: Potential mock implementations found" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No mock implementations detected" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Check for TODOs
        run: |
          echo "## TODO Detection Report" >> $GITHUB_STEP_SUMMARY
          if grep -r "TODO\|FIXME\|HACK" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules . 2>/dev/null; then
            echo "⚠️ Warning: TODOs found in code" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No TODOs found" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Check TypeScript strict mode
        run: |
          echo "## TypeScript Strict Mode Check" >> $GITHUB_STEP_SUMMARY
          if npx tsc --noEmit --strict; then
            echo "✅ TypeScript strict mode passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ TypeScript strict mode errors" >> $GITHUB_STEP_SUMMARY
          fi